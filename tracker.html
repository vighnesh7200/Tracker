<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Daily health & fitness tracker with exercise checklist, nutrition goals, and streak tracking">
<title>Daily Tracker</title>

<!-- PWA / Standalone mode -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<meta name="application-name" content="Daily Tracker">
<meta name="theme-color" content="#0F0F14">
<meta name="msapplication-TileColor" content="#0F0F14">

<!-- Inline Web App Manifest (no separate file needed) -->
<link rel="manifest" href="data:application/manifest+json,{
  &quot;name&quot;: &quot;Daily Tracker&quot;,
  &quot;short_name&quot;: &quot;Tracker&quot;,
  &quot;description&quot;: &quot;Daily health and fitness tracker&quot;,
  &quot;start_url&quot;: &quot;.&quot;,
  &quot;display&quot;: &quot;standalone&quot;,
  &quot;orientation&quot;: &quot;portrait&quot;,
  &quot;background_color&quot;: &quot;#0F0F14&quot;,
  &quot;theme_color&quot;: &quot;#0F0F14&quot;,
  &quot;icons&quot;: [{
    &quot;src&quot;: &quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%230F0F14'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='280' font-family='system-ui' fill='%234ADE80'>&#10003;</text></svg>&quot;,
    &quot;sizes&quot;: &quot;any&quot;,
    &quot;type&quot;: &quot;image/svg+xml&quot;,
    &quot;purpose&quot;: &quot;any maskable&quot;
  }]
}">
<style>
/* ===== CSS CUSTOM PROPERTIES ===== */
:root {
  --bg:          #0F0F14;
  --bg2:         #16161f;
  --bg3:         #1e1e2a;
  --card:        #1a1a24;
  --border:      rgba(255,255,255,0.08);
  --border-act:  rgba(74,222,128,0.35);
  --text:        #e8e8f0;
  --text-dim:    #7878a0;
  --text-muted:  #4a4a6a;
  --accent:      #4ADE80;
  --accent-dim:  rgba(74,222,128,0.15);
  --accent-glow: rgba(74,222,128,0.08);
  --danger:      #f87171;
  --warn:        #fbbf24;
  --radius:      14px;
  --radius-sm:   8px;
  --transition:  0.22s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg:         #f0f0f8;
  --bg2:        #e8e8f2;
  --bg3:        #dcdcec;
  --card:       #ffffff;
  --border:     rgba(0,0,0,0.08);
  --border-act: rgba(22,163,74,0.35);
  --text:       #1a1a2e;
  --text-dim:   #5a5a7a;
  --text-muted: #9090b0;
  --accent:     #16a34a;
  --accent-dim: rgba(22,163,74,0.12);
  --accent-glow:rgba(22,163,74,0.06);
  --danger:     #dc2626;
  --warn:       #d97706;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 0;
  /* Respect notch/status bar in standalone mode */
  padding-top: env(safe-area-inset-top);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
#app {
  width: 100%;
  max-width: 390px;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 18px 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-date {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}
.header-right { display: flex; gap: 8px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: all var(--transition);
  -webkit-user-select: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { transform: scale(0.92); background: var(--bg3); }

/* ===== SCROLL AREA ===== */
.scroll-area { flex: 1; overflow-y: auto; padding: 14px 14px calc(100px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; gap: 14px; }
.scroll-area::-webkit-scrollbar { display: none; }

/* ===== STREAK BANNER ===== */
.streak-banner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.streak-num-wrap { display: flex; flex-direction: column; align-items: center; min-width: 64px; }
.streak-num {
  font-size: 52px;
  font-weight: 800;
  line-height: 1;
  color: var(--accent);
  letter-spacing: -0.04em;
  text-shadow: 0 0 24px var(--accent-glow);
}
.streak-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }
.streak-divider { width: 1px; height: 60px; background: var(--border); flex-shrink: 0; }
.streak-calendar { flex: 1; }
.cal-row { display: flex; justify-content: space-between; }
.cal-day { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.cal-day-label { font-size: 9px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); }
.cal-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 700;
  transition: all var(--transition);
}
.cal-dot.done { background: var(--accent); border-color: var(--accent); color: #fff; }
.cal-dot.today { border-color: var(--accent); color: var(--accent); }
.cal-dot.future { opacity: 0.35; }

/* ===== SECTION CARD ===== */
.section-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.section-progress {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
}
.section-progress.zero { color: var(--text-muted); }

/* ===== DAY SWITCHER ===== */
.day-switcher {
  display: flex;
  gap: 4px;
  padding: 10px 14px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.day-switcher::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0;
  padding: 5px 11px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.03em;
}
.day-tab.active {
  background: var(--accent-dim);
  border-color: var(--border-act);
  color: var(--accent);
}
.day-tab:active { transform: scale(0.95); }

/* ===== REST DAY ===== */
.rest-day {
  padding: 24px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.rest-icon { font-size: 28px; color: var(--text-dim); }
.rest-title { font-size: 15px; font-weight: 700; color: var(--text); }
.rest-tip { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

/* ===== CHECKLIST ===== */
.checklist { display: flex; flex-direction: column; }
.food-group { }
.food-group-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 10px 16px 4px;
}
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.check-item:last-child { border-bottom: none; }
.check-item:active { background: var(--bg3); }
.check-item.checked { background: var(--accent-glow); }
.check-item.checked .item-label { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--text-muted); }
.check-item.hidden { display: none; }
.check-box {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 1.5px solid var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  font-size: 12px;
  color: transparent;
  font-weight: 700;
}
.check-item.checked .check-box {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 10px var(--accent-dim);
}
.item-label {
  flex: 1;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  transition: color var(--transition);
  word-break: break-word;
  outline: none;
}
.item-label[contenteditable="true"] {
  background: var(--bg3);
  border-radius: 4px;
  padding: 1px 6px;
  border: 1px solid var(--border-act);
  color: var(--text);
}
.delete-hint {
  font-size: 10px;
  color: var(--danger);
  position: absolute;
  right: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
  font-weight: 600;
}
.check-item.long-pressing .delete-hint { opacity: 1; }

/* ===== ADD ITEM BUTTON ===== */
.add-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  cursor: pointer;
  width: 100%;
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}
.add-btn:active { background: var(--bg3); color: var(--accent); }
.add-btn-icon { font-size: 16px; font-weight: 400; }

/* ===== SETTINGS PANEL ===== */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
  backdrop-filter: blur(4px);
}
.settings-overlay.open { opacity: 1; pointer-events: all; }
.settings-sheet {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 390px;
  background: var(--bg2);
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
  z-index: 101;
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 80vh;
  overflow-y: auto;
}
.settings-sheet::-webkit-scrollbar { display: none; }
.settings-sheet.open { transform: translateX(-50%) translateY(0); }
.settings-handle {
  width: 40px; height: 4px;
  background: var(--text-muted);
  border-radius: 2px;
  margin: 12px auto 16px;
}
.settings-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 0 18px 16px;
  border-bottom: 1px solid var(--border);
}
.settings-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }
.settings-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 0;
}
.settings-row-label { font-size: 13px; font-weight: 500; color: var(--text); }
/* Toggle switch */
.toggle {
  position: relative;
  width: 42px; height: 24px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0;
  border-radius: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  transition: all var(--transition);
  cursor: pointer;
}
.toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  transition: all var(--transition);
  pointer-events: none;
}
.toggle input:checked ~ .toggle-thumb { left: 21px; }

/* ===== SECTION COMPLETION BAR ===== */
.progress-bar-wrap { height: 2px; background: var(--bg3); }
.progress-bar {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
  border-radius: 1px;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 16px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s ease;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== ANIMATIONS ===== */
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
.check-box.pop { animation: pop 0.22s ease; }

@keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.check-item { animation: slideIn 0.18s ease both; }

/* ===== LONG PRESS INDICATOR ===== */
.check-item.long-pressing { background: rgba(248,113,113,0.06); }

/* ===== SECTION COLLAPSE ===== */
.section-body { }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="header-date" id="hdrDate"></div>
      <div class="header-title">Daily Tracker</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">&#9788;</button>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Open settings">&#9881;</button>
    </div>
  </header>

  <!-- MAIN SCROLL AREA -->
  <main class="scroll-area" id="mainScroll">

    <!-- STREAK BANNER -->
    <div class="streak-banner">
      <div class="streak-num-wrap">
        <div class="streak-num" id="streakNum">0</div>
        <div class="streak-label">Day Streak</div>
      </div>
      <div class="streak-divider"></div>
      <div class="streak-calendar">
        <div class="cal-row" id="calRow"></div>
      </div>
    </div>

    <!-- EXERCISE SECTION -->
    <div class="section-card" id="exerciseSection">
      <div class="section-header">
        <span class="section-title">Exercise</span>
        <span class="section-progress zero" id="exProgress">0 / 0</span>
      </div>
      <!-- Day Switcher -->
      <div class="day-switcher" id="daySwitcher">
        <button class="day-tab" data-day="0">Sun</button>
        <button class="day-tab" data-day="1">Mon</button>
        <button class="day-tab" data-day="2">Tue</button>
        <button class="day-tab" data-day="3">Wed</button>
        <button class="day-tab" data-day="4">Thu</button>
        <button class="day-tab" data-day="5">Fri</button>
        <button class="day-tab" data-day="6">Sat</button>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="exBar" style="width:0%"></div></div>
      <div class="section-body" id="exerciseBody"></div>
      <div class="checklist" id="exerciseCustomList"></div>
      <button class="add-btn" id="addExercise"><span class="add-btn-icon">+</span> Add exercise</button>
    </div>

    <!-- FOOD SECTION -->
    <div class="section-card" id="foodSection">
      <div class="section-header">
        <span class="section-title">Nutrition</span>
        <span class="section-progress zero" id="foodProgress">0 / 0</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="foodBar" style="width:0%"></div></div>
      <div class="section-body" id="foodBody"></div>
      <button class="add-btn" id="addFood"><span class="add-btn-icon">+</span> Add food item</button>
    </div>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- SETTINGS OVERLAY -->
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-sheet" id="settingsSheet">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>

    <div class="settings-section">
      <div class="settings-section-label">Appearance</div>
      <div class="settings-row">
        <span class="settings-row-label">Light Mode</span>
        <label class="toggle">
          <input type="checkbox" id="lightModeToggle">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-label">Food Items — Active Today</div>
      <div id="settingsFoodToggles"></div>
    </div>

    <div class="settings-section">
      <div class="settings-section-label">Streak</div>
      <div class="settings-row">
        <span class="settings-row-label">Reset streak to 0</span>
        <button class="icon-btn" id="resetStreakBtn" style="color:var(--danger);border-color:var(--danger);">&#8635;</button>
      </div>
    </div>

    <div style="height:20px;"></div>
  </div>

</div>

<script>
/* ========================================================
   DAILY TRACKER — full vanilla JS implementation
   ======================================================== */

// ---- UTILITIES ----
const $ = id => document.getElementById(id);
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
};

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayOfWeek(d) { return d.getDay(); } // 0=Sun,1=Mon,...
function todayDow() { return new Date().getDay(); }

// ---- RECOVERY TIPS ----
const RECOVERY_TIPS = [
  "Focus on sleep quality tonight. 8h is your best performance supplement.",
  "Active recovery: a 20-min walk keeps blood flowing without taxing muscles.",
  "Hydrate well — aim for 3L today. Muscles repair faster when well-hydrated.",
  "Foam roll your tightest areas for 10 minutes. Your joints will thank you.",
  "Spend 10 minutes on deep breathing or meditation. Recovery is mental too."
];
function randomTip() { return RECOVERY_TIPS[Math.floor(Math.random()*RECOVERY_TIPS.length)]; }

// ---- DEFAULT EXERCISE DATA ----
// day index: 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
const DEFAULT_EXERCISES = {
  0: null, // Sunday — rest
  1: { // Monday — Push
    label: "Push Day",
    items: [
      "Bench Press",
      "Incline DB Press",
      "Overhead Press",
      "Lateral Raises",
      "Cable Fly",
      "Tricep Pushdowns",
      "Rope Jumps 3\u00d72min"
    ]
  },
  2: { // Tuesday — Pull
    label: "Pull Day",
    items: [
      "Pull-ups",
      "Bent-over Row",
      "Seated Cable Row",
      "Face Pulls",
      "Barbell Curl",
      "Dead Hang 3\u00d745sec"
    ]
  },
  3: null, // Wednesday — rest
  4: { // Thursday — Legs
    label: "Leg Day",
    items: [
      "Barbell Squat",
      "Romanian Deadlift",
      "Leg Press",
      "Leg Curl",
      "Walking Lunges",
      "Calf Raises"
    ]
  },
  5: { // Friday — Arms + Core
    label: "Arms + Core",
    items: [
      "Hammer Curl",
      "Skull Crushers",
      "Preacher Curl",
      "Tricep Overhead Extension",
      "Hanging Leg Raises",
      "Dragon Flag Negatives",
      "Ab Wheel Rollout",
      "Oblique Cable Crunch",
      "Hollow Body Hold",
      "Rope Jumps 3\u00d73min"
    ]
  },
  6: { // Saturday — Cardio
    label: "Cardio",
    items: [
      "Rope Jumps 5min warmup",
      "5km Run",
      "Post-run Stretch 10min"
    ]
  }
};

// ---- DEFAULT FOOD DATA ----
// Each item: { id, group, label, special (optional: 'mon_wed'|'fri'), active }
const DEFAULT_FOOD = [
  { id:"f_mw1",  group:"Morning",    label:"Warm water",                special:null },
  { id:"f_mw2",  group:"Morning",    label:"3 soaked almonds",          special:null },
  { id:"f_mw3",  group:"Morning",    label:"Lemon squeeze",             special:null },
  { id:"f_br1",  group:"Breakfast",  label:"Oats + milk (1\u2044\u2082 cup oats, 350ml)", special:null },
  { id:"f_br2",  group:"Breakfast",  label:"3 tbsp peanut butter",      special:null },
  { id:"f_br3",  group:"Breakfast",  label:"2 tbsp honey",              special:null },
  { id:"f_br4",  group:"Breakfast",  label:"2 elaichi bananas",         special:null },
  { id:"f_br5",  group:"Breakfast",  label:"2 whole eggs",              special:null },
  { id:"f_ln1",  group:"Lunch",      label:"Double dal serving",        special:null },
  { id:"f_ln2",  group:"Lunch",      label:"Rice or roti",              special:null },
  { id:"f_ln3",  group:"Lunch",      label:"Curd if available",         special:null },
  { id:"f_ck1",  group:"Chicken Day (Mon\u2044Wed)", label:"250g chicken breast", special:"mon_wed" },
  { id:"f_lv1",  group:"Liver Day (Fri)",  label:"75\u2013100g chicken liver",  special:"fri" },
  { id:"f_dn1",  group:"Dinner",     label:"1.5 bhakri",                special:null },
  { id:"f_dn2",  group:"Dinner",     label:"Mom\u2019s sabzi",          special:null },
  { id:"f_dn3",  group:"Dinner",     label:"1 cup curd",                special:null },
  { id:"f_bd1",  group:"Bedtime",    label:"1 glass 4% fat milk",       special:null },
  { id:"f_bd2",  group:"Bedtime",    label:"Pinch haldi",               special:null },
];

// ---- STATE ----
let state = {
  theme: "dark",
  viewDay: todayDow(),  // which day's exercises we're viewing
  exercises: {},        // { [dayIndex]: { items:[{id,label,checked}], custom:[{id,label,checked}] } }
  foodItems: [],        // array of food item objects (merged with defaults)
  foodChecked: {},      // { [dateKey]: { [itemId]: bool } }
  streak: 0,
  streakHistory: {},    // { [dateKey]: bool } — was that day "complete"?
  lastFoodDate: null,
};

const SK = "dailyTracker_v3";

// ---- PERSISTENCE ----
function saveState() {
  try { localStorage.setItem(SK, JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // Merge saved state carefully
    if (saved.theme) state.theme = saved.theme;
    if (saved.viewDay != null) state.viewDay = saved.viewDay;
    if (saved.exercises) state.exercises = saved.exercises;
    if (saved.foodItems && saved.foodItems.length) state.foodItems = saved.foodItems;
    if (saved.foodChecked) state.foodChecked = saved.foodChecked;
    if (saved.streak != null) state.streak = saved.streak;
    if (saved.streakHistory) state.streakHistory = saved.streakHistory;
    if (saved.lastFoodDate) state.lastFoodDate = saved.lastFoodDate;
  } catch(e){}
}

// ---- INIT FOOD ITEMS ----
function initFoodItems() {
  if (state.foodItems && state.foodItems.length > 0) return; // already loaded
  const dow = todayDow();
  state.foodItems = DEFAULT_FOOD.map(f => {
    let active = true;
    if (f.special === "mon_wed" && dow !== 1 && dow !== 3) active = false;
    if (f.special === "fri"     && dow !== 5)              active = false;
    return { ...f, active };
  });
}

// ---- INIT EXERCISES ----
function initExercises() {
  // For each day, if not already in state, build from defaults
  for (let d = 0; d <= 6; d++) {
    if (!state.exercises[d]) {
      state.exercises[d] = { items: [], custom: [] };
      const def = DEFAULT_EXERCISES[d];
      if (def && def.items) {
        state.exercises[d].items = def.items.map((label, i) => ({
          id: `ex_${d}_${i}`,
          label,
          checked: false
        }));
      }
    }
  }
}

// ---- FOOD CHECKED FOR TODAY ----
function todayFoodChecked() {
  const k = todayKey();
  if (!state.foodChecked[k]) state.foodChecked[k] = {};
  return state.foodChecked[k];
}

// ---- MIDNIGHT RESET ----
function midnightReset() {
  const k = todayKey();
  if (state.lastFoodDate && state.lastFoodDate !== k) {
    // New day — check if yesterday was completed for streak
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yk = dateKey(yesterday);
    // Yesterday's completion was already computed when we saved; just update streak
    computeStreak();
  }
  state.lastFoodDate = k;
  saveState();
}

// ---- COMPUTE STREAK ----
function computeStreak() {
  // Walk backwards from today, counting consecutive complete days
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = dateKey(d);
    if (state.streakHistory[k]) {
      streak++;
    } else {
      if (i === 0) break; // today not done yet — don't break streak for today
      break;
    }
  }
  state.streak = streak;
}

// ---- MARK TODAY COMPLETE ----
function checkTodayComplete() {
  const k = todayKey();
  const food = todayFoodChecked();
  const activeFoodItems = state.foodItems.filter(f => f.active);
  const allFoodDone = activeFoodItems.length > 0 && activeFoodItems.every(f => food[f.id]);

  const dow = todayDow();
  let allExDone = true;
  const exDay = state.exercises[dow];
  const def = DEFAULT_EXERCISES[dow];
  if (def) { // workout day
    const allItems = [...exDay.items, ...exDay.custom];
    allExDone = allItems.length > 0 && allItems.every(it => it.checked);
  }

  const complete = allFoodDone && allExDone;
  if (complete && !state.streakHistory[k]) {
    state.streakHistory[k] = true;
    computeStreak();
    saveState();
    renderStreak();
    showToast("\u2713 Day complete! Streak updated.");
  }
}

// ---- LONG PRESS ----
function makeLongPressable(elem, onLongPress) {
  let timer;
  let fired = false;
  const START = ['touchstart','mousedown'];
  const END   = ['touchend','mouseup','mouseleave','touchcancel'];
  START.forEach(ev => elem.addEventListener(ev, e => {
    fired = false;
    elem.classList.add('long-pressing');
    timer = setTimeout(() => {
      fired = true;
      elem.classList.remove('long-pressing');
      onLongPress(e);
    }, 600);
  }, {passive:true}));
  END.forEach(ev => elem.addEventListener(ev, () => {
    clearTimeout(timer);
    if (!fired) elem.classList.remove('long-pressing');
  }, {passive:true}));
  return () => fired; // returns getter
}

// ---- RENDER ----
function renderAll() {
  renderHeader();
  renderStreak();
  renderExercise();
  renderFood();
  renderSettingsFoodToggles();
  applyTheme();
}

function renderHeader() {
  const d = new Date();
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  $("hdrDate").textContent = `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

// ---- STREAK RENDER ----
function renderStreak() {
  $("streakNum").textContent = state.streak;

  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const row = $("calRow");
  row.innerHTML = "";
  const labels = ["S","M","T","W","T","F","S"];

  const todK = todayKey();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - dow + i);
    const k = dateKey(d);
    const isToday = (k === todK);
    const isFuture = (k > todK);

    const div = el("div","cal-day");
    const lbl = el("div","cal-day-label", labels[i]);
    const dot = el("div","cal-dot");

    if (state.streakHistory[k]) {
      dot.classList.add("done");
      dot.textContent = "\u2713";
    } else if (isToday) {
      dot.classList.add("today");
      dot.textContent = "\u25cb";
    } else if (isFuture) {
      dot.classList.add("future");
    }

    div.appendChild(lbl);
    div.appendChild(dot);
    row.appendChild(div);
  }
}

// ---- EXERCISE RENDER ----
function renderExercise() {
  const body = $("exerciseBody");
  const customList = $("exerciseCustomList");
  body.innerHTML = "";
  customList.innerHTML = "";

  const dow = state.viewDay;
  const def = DEFAULT_EXERCISES[dow];
  const exDay = state.exercises[dow] || { items: [], custom: [] };

  // Highlight active day tab
  document.querySelectorAll(".day-tab").forEach(tab => {
    tab.classList.toggle("active", parseInt(tab.dataset.day) === dow);
  });

  if (!def) {
    // Rest day
    const rest = el("div","rest-day");
    const dayNames = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    rest.innerHTML = `
      <div class="rest-icon">\u25CE</div>
      <div class="rest-title">${dayNames[dow]} — Rest Day</div>
      <div class="rest-tip">${randomTip()}</div>
    `;
    body.appendChild(rest);
    $("exProgress").textContent = "Rest";
    $("exProgress").className = "section-progress zero";
    $("exBar").style.width = "0%";
    $("addExercise").style.display = "none";
    return;
  }

  $("addExercise").style.display = "flex";

  // Render default items
  const list = el("div","checklist");
  exDay.items.forEach(item => {
    list.appendChild(makeCheckItem(item, "ex", dow));
  });
  body.appendChild(list);

  // Render custom items
  exDay.custom.forEach(item => {
    customList.appendChild(makeCheckItem(item, "ex_custom", dow));
  });

  updateExProgress();
}

function updateExProgress() {
  const dow = state.viewDay;
  const def = DEFAULT_EXERCISES[dow];
  if (!def) return;
  const exDay = state.exercises[dow] || { items: [], custom: [] };
  const all = [...exDay.items, ...exDay.custom];
  const done = all.filter(i => i.checked).length;
  const total = all.length;
  const pEl = $("exProgress");
  pEl.textContent = `${done} / ${total}`;
  pEl.className = "section-progress" + (done === 0 ? " zero" : "");
  $("exBar").style.width = total ? `${(done/total)*100}%` : "0%";
}

// ---- FOOD RENDER ----
function renderFood() {
  const body = $("foodBody");
  body.innerHTML = "";
  const checked = todayFoodChecked();

  // Group items
  const groups = {};
  state.foodItems.forEach(f => {
    if (!f.active) return;
    if (!groups[f.group]) groups[f.group] = [];
    groups[f.group].push(f);
  });

  Object.keys(groups).forEach(gName => {
    const grp = el("div","food-group");
    const lbl = el("div","food-group-label", gName);
    grp.appendChild(lbl);
    const list = el("div","checklist");
    groups[gName].forEach(f => {
      const item = { id: f.id, label: f.label, checked: !!checked[f.id] };
      list.appendChild(makeCheckItem(item, "food", null));
    });
    grp.appendChild(list);
    body.appendChild(grp);
  });

  updateFoodProgress();
}

function updateFoodProgress() {
  const checked = todayFoodChecked();
  const active = state.foodItems.filter(f => f.active);
  const done = active.filter(f => checked[f.id]).length;
  const total = active.length;
  const pEl = $("foodProgress");
  pEl.textContent = `${done} / ${total}`;
  pEl.className = "section-progress" + (done === 0 ? " zero" : "");
  $("foodBar").style.width = total ? `${(done/total)*100}%` : "0%";
}

// ---- MAKE CHECK ITEM ----
function makeCheckItem(item, type, dayIndex) {
  const row = el("div", "check-item" + (item.checked ? " checked" : ""));
  row.dataset.id = item.id;
  row.dataset.type = type;
  if (dayIndex !== null) row.dataset.day = dayIndex;

  const box = el("div","check-box", "\u2713");
  const label = el("div","item-label");
  label.textContent = item.label;
  label.setAttribute("tabindex","0");
  const hint = el("div","delete-hint","Hold to delete");

  row.appendChild(box);
  row.appendChild(label);
  row.appendChild(hint);

  // Toggle on click/tap
  let longPressFired = false;

  // Double-click to rename
  label.addEventListener("dblclick", e => {
    e.stopPropagation();
    startRename(label, item, type, dayIndex);
  });

  // Long press to delete
  let lpTimer;
  const startLP = () => {
    longPressFired = false;
    row.classList.add("long-pressing");
    lpTimer = setTimeout(() => {
      longPressFired = true;
      row.classList.remove("long-pressing");
      confirmDelete(row, item, type, dayIndex);
    }, 600);
  };
  const cancelLP = () => {
    clearTimeout(lpTimer);
    row.classList.remove("long-pressing");
  };

  row.addEventListener("touchstart", startLP, {passive:true});
  row.addEventListener("mousedown", startLP);
  row.addEventListener("touchend", cancelLP, {passive:true});
  row.addEventListener("mouseup", cancelLP);
  row.addEventListener("mouseleave", cancelLP);
  row.addEventListener("touchcancel", cancelLP, {passive:true});

  // Toggle check
  row.addEventListener("click", () => {
    if (longPressFired) { longPressFired = false; return; }
    if (label.contentEditable === "true") return;
    toggleItem(item, type, dayIndex, row, box);
  });

  return row;
}

function toggleItem(item, type, dayIndex, row, box) {
  item.checked = !item.checked;
  row.classList.toggle("checked", item.checked);
  box.classList.add("pop");
  box.addEventListener("animationend", () => box.classList.remove("pop"), {once:true});

  if (type === "food") {
    const checked = todayFoodChecked();
    checked[item.id] = item.checked;
    updateFoodProgress();
    checkTodayComplete();
  } else {
    updateExProgress();
    if (state.viewDay === todayDow()) checkTodayComplete();
  }
  saveState();
}

// ---- RENAME ----
function startRename(labelEl, item, type, dayIndex) {
  labelEl.contentEditable = "true";
  labelEl.focus();
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(labelEl);
  sel.removeAllRanges();
  sel.addRange(range);

  const finish = () => {
    labelEl.contentEditable = "false";
    const newLabel = labelEl.textContent.trim();
    if (newLabel) {
      item.label = newLabel;
      labelEl.textContent = newLabel;
      // sync food item label
      if (type === "food") {
        const fi = state.foodItems.find(f => f.id === item.id);
        if (fi) fi.label = newLabel;
      }
      saveState();
    } else {
      labelEl.textContent = item.label;
    }
  };

  labelEl.addEventListener("blur", finish, {once:true});
  labelEl.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); labelEl.blur(); }
    if (e.key === "Escape") { labelEl.textContent = item.label; labelEl.blur(); }
  });
}

// ---- DELETE ----
function confirmDelete(row, item, type, dayIndex) {
  // Animate out
  row.style.transition = "all 0.22s ease";
  row.style.opacity = "0";
  row.style.maxHeight = row.offsetHeight + "px";
  row.style.overflow = "hidden";
  requestAnimationFrame(() => {
    row.style.maxHeight = "0";
    row.style.paddingTop = "0";
    row.style.paddingBottom = "0";
  });
  setTimeout(() => {
    row.remove();
    // Remove from state
    if (type === "food") {
      state.foodItems = state.foodItems.filter(f => f.id !== item.id);
      updateFoodProgress();
      renderSettingsFoodToggles();
    } else if (type === "ex") {
      const exDay = state.exercises[dayIndex];
      if (exDay) exDay.items = exDay.items.filter(i => i.id !== item.id);
      updateExProgress();
    } else if (type === "ex_custom") {
      const exDay = state.exercises[dayIndex];
      if (exDay) exDay.custom = exDay.custom.filter(i => i.id !== item.id);
      updateExProgress();
    }
    saveState();
    showToast("Item deleted");
  }, 260);
}

// ---- ADD ITEM ----
function addExerciseItem() {
  const dow = state.viewDay;
  const def = DEFAULT_EXERCISES[dow];
  if (!def) return;
  const id = `ex_custom_${dow}_${Date.now()}`;
  const item = { id, label: "New exercise", checked: false };
  state.exercises[dow].custom.push(item);
  saveState();
  const customList = $("exerciseCustomList");
  const row = makeCheckItem(item, "ex_custom", dow);
  customList.appendChild(row);
  // Immediately start rename
  const lbl = row.querySelector(".item-label");
  setTimeout(() => startRename(lbl, item, "ex_custom", dow), 50);
  updateExProgress();
}

function addFoodItem() {
  const id = `food_custom_${Date.now()}`;
  const item = { id, group:"Custom", label:"New item", special:null, active:true };
  state.foodItems.push(item);
  saveState();
  // Re-render food section
  renderFood();
  renderSettingsFoodToggles();
  // Focus new item
  const rows = $("foodBody").querySelectorAll(".check-item");
  const last = rows[rows.length-1];
  if (last) {
    const lbl = last.querySelector(".item-label");
    const fi = state.foodItems[state.foodItems.length-1];
    setTimeout(() => startRename(lbl, fi, "food", null), 50);
  }
}

// ---- SETTINGS FOOD TOGGLES ----
function renderSettingsFoodToggles() {
  const container = $("settingsFoodToggles");
  container.innerHTML = "";
  state.foodItems.forEach(f => {
    const row = el("div","settings-row");
    const lbl = el("span","settings-row-label", f.label);

    const toggle = el("label","toggle");
    const input = el("input");
    input.type = "checkbox";
    input.checked = f.active;
    input.addEventListener("change", () => {
      f.active = input.checked;
      saveState();
      renderFood();
    });
    const track = el("div","toggle-track");
    const thumb = el("div","toggle-thumb");
    toggle.appendChild(input);
    toggle.appendChild(track);
    toggle.appendChild(thumb);

    row.appendChild(lbl);
    row.appendChild(toggle);
    container.appendChild(row);
  });
}

// ---- THEME ----
function applyTheme() {
  document.documentElement.dataset.theme = state.theme === "light" ? "light" : "";
  $("lightModeToggle").checked = state.theme === "light";
}

// ---- TOAST ----
let toastTimer;
function showToast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// ---- SETTINGS PANEL ----
function openSettings() {
  $("settingsOverlay").classList.add("open");
  $("settingsSheet").classList.add("open");
}
function closeSettings() {
  $("settingsOverlay").classList.remove("open");
  $("settingsSheet").classList.remove("open");
}

// ---- DAY SWITCHER ----
function setupDaySwitcher() {
  document.querySelectorAll(".day-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      state.viewDay = parseInt(tab.dataset.day);
      saveState();
      renderExercise();
    });
  });
}

// ---- MIDNIGHT CHECK ----
function scheduleMidnightReset() {
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 5);
  const ms = midnight - now;
  setTimeout(() => {
    midnightReset();
    renderAll();
    scheduleMidnightReset();
  }, ms);
}

// ---- MAIN INIT ----
function init() {
  loadState();
  initFoodItems();
  initExercises();
  midnightReset();
  computeStreak();

  // Ensure today's viewDay is set correctly on fresh load
  if (!localStorage.getItem(SK)) {
    state.viewDay = todayDow();
  }

  renderAll();
  setupDaySwitcher();
  scheduleMidnightReset();

  // Wire settings
  $("settingsBtn").addEventListener("click", openSettings);
  $("settingsOverlay").addEventListener("click", closeSettings);

  // Theme toggle
  $("themeBtn").addEventListener("click", () => {
    state.theme = state.theme === "dark" ? "light" : "dark";
    applyTheme();
    saveState();
  });
  $("lightModeToggle").addEventListener("change", e => {
    state.theme = e.target.checked ? "light" : "dark";
    applyTheme();
    saveState();
  });

  // Add buttons
  $("addExercise").addEventListener("click", addExerciseItem);
  $("addFood").addEventListener("click", addFoodItem);

  // Reset streak
  $("resetStreakBtn").addEventListener("click", () => {
    if (confirm("Reset streak to 0? This also clears history.")) {
      state.streak = 0;
      state.streakHistory = {};
      saveState();
      renderStreak();
      showToast("Streak reset.");
    }
  });

  // Swipe down to close settings sheet
  let sheetStartY;
  const sheet = $("settingsSheet");
  sheet.addEventListener("touchstart", e => { sheetStartY = e.touches[0].clientY; }, {passive:true});
  sheet.addEventListener("touchmove", e => {
    const dy = e.touches[0].clientY - sheetStartY;
    if (dy > 60) closeSettings();
  }, {passive:true});
}

// Boot
document.addEventListener("DOMContentLoaded", init);
</script>
